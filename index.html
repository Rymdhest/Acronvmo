<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACRONYMO: LIMIT BREAK</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="vampire-theme">
    
    <div id="background-data-layer" class="data-layer"></div>
    <div class="leaderboard-sidebar">
        <h3 class="leaderboard-title">LEADERBOARD</h3>
        <ul id="leaderboard-list">
            <li class="loading">SYNCING...</li>
        </ul>
    </div>
    <div class="game-wrapper" id="game-wrapper">
        <div class="hud">
            <div class="score-container">
                <span class="label">SCORE</span>
                <span id="score" class="value">0</span>
            </div>
            <div id="lives-container" class="lives-container">
                <span class="heart">❤</span>
                <span class="heart">❤</span>
                <span class="heart">❤</span>
            </div>
        </div>

        <div class="main-card" id="main-card">
            <div id="question-box">READY?</div>
            <div id="continue-prompt" style="font-size: 1.2rem; margin-top: 10px; opacity: 0;">CLICK TO CONTINUE</div>
        </div>

        <div class="answer-grid">
            <button class="answer-btn" onclick="handleChoice(0)"><span id="opt0">---</span></button>
            <button class="answer-btn" onclick="handleChoice(1)"><span id="opt1">---</span></button>
            <button class="answer-btn" onclick="handleChoice(2)"><span id="opt2">---</span></button>
            <button class="answer-btn" onclick="handleChoice(3)"><span id="opt3">---</span></button>
        </div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
        <div class="terminal-card">
            <h1 class="glitch-text">GAME OVER</h1>
            
            <div class="final-stats">
                <div class="stat-item">
                    <span class="label">SCORE</span>
                    <span id="final-score" class="gold-text">0</span>
                </div>
            </div>

            <div class="input-section">
                <input type="text" 
                    id="player-name" 
                    placeholder="ENTER YOUR NAME" 
                    maxlength="12" 
                    oninput="validateInput()"> 
                
                <button id="submit-btn" 
                    onclick="uploadScore()" 
                    disabled>UPLOAD TO HIGHSCORE</button> 
                
                <button class="retry-btn" onclick="resetGame()">RESTART GAME</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
